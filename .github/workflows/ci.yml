name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_TEST_THREADS: "1"

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            os: ubuntu-latest
          - arch: aarch64
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Install musl-tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache cargo registry
        uses: actions/cache@v6
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Fetch libc-test sources
        run: git clone --depth 1 https://github.com/kraj/libc-test /tmp/libc-test

      - name: Build all artifacts
        run: cargo build --workspace

      - name: Run integration tests
        run: cargo test --workspace

      - name: Run libc-test harness (informational)
        continue-on-error: true
        env:
          LIBC_TEST_DIR: /tmp/libc-test
        run: |
          cd libc-test-harness
          ./run.sh functional
